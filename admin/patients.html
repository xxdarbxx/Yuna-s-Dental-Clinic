<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients — Yuna's Dental Clinic</title>
  <link rel="icon" href="../assets/img/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar__brand">
        <img src="../assets/img/logo.jpg" alt="Yuna's Dental Clinic" />
        <span>
          <strong>Yuna's Dental Clinic</strong>
          <span>Staff Portal</span>
        </span>
      </a>
      <nav class="sidebar__nav">
        <a href="dashboard.html"><span class="ico">📊</span> Dashboard</a>
        <a href="patients.html" class="active"><span class="ico">👤</span> Patients</a>
        <a href="appointments.html"><span class="ico">📅</span> Appointments</a>
        <a href="treatments.html"><span class="ico">🦷</span> Treatments</a>
        <a href="billing.html"><span class="ico">💰</span> Billing</a>
        <a href="../index.html"><span class="ico">🌐</span> View Website</a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar" id="userAvatar">--</div>
          <div>
            <strong id="userName">Loading…</strong>
            <span id="userRoleLabel">—</span>
          </div>
        </div>
        <button class="btn btn--outline btn--block btn--sm" id="logoutBtn">Log Out</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="topbar__menu" id="sidebarToggle">☰</button>
        <div>
          <h1>Patients</h1>
          <p class="topbar__sub" id="countLabel">—</p>
        </div>
        <div class="quick-actions">
          <button class="btn btn--primary btn--sm" id="addPatientBtn">+ Add Patient</button>
        </div>
      </div>

      <div class="content">
        <div class="panel">
          <div class="toolbar">
            <div class="search-input">
              <input type="text" id="searchInput" placeholder="Search by name, phone, or email…" />
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Age</th>
                  <th>Registered</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="patientsBody">
                <tr><td colspan="6" class="text-center text-muted" style="padding:24px;">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add / Edit Patient Modal -->
  <div class="modal-overlay" id="patientModal">
    <div class="modal">
      <div class="modal__head">
        <h2 id="patientModalTitle">Add Patient</h2>
        <button class="modal__close" data-close-modal>✕</button>
      </div>
      <div class="form-error" id="patientError"></div>
      <form id="patientForm">
        <input type="hidden" id="patientId" />
        <div class="field-row">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" />
          </div>
          <div class="field">
            <label for="gender">Gender</label>
            <select id="gender">
              <option value="">Select</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required />
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" />
          </div>
        </div>
        <div class="field">
          <label for="address">Address</label>
          <input type="text" id="address" />
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn--outline" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn--primary" id="patientSaveBtn">Save Patient</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/patients.js"></script>
</body>
</html>
